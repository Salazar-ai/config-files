# ═══════════════════════════════════════════════════════════════════════════════
#  mpv.conf — salazar @ Fedora KDE / ASUS Vivobook 16X (Ryzen 7 5800H)
#  Hardware: AMD Ryzen 7 5800H + Radeon Vega iGPU | Wayland | PipeWire
#  Changes from previous version are marked with [FIXED], [ADDED], [REMOVED]
# ═══════════════════════════════════════════════════════════════════════════════

# ─── YTDL / yt-dlp ────────────────────────────────────────────────────────────
ytdl=yes
script-opts-append=ytdl_hook-try_ytdl_first=yes
script-opts-append=ytdl_hook-ytdl_path=yt-dlp

# ─── VIDEO OUTPUT ─────────────────────────────────────────────────────────────
vo=gpu-next
gpu-api=opengl
gpu-context=wayland
hwdec=no                              # VAAPI detected and working in log

# ─── PERFORMANCE PROFILE ──────────────────────────────────────────────────────
profile=fast
scale=bilinear
cscale=bilinear
dscale=bilinear
video-sync=audio                        # Less CPU than display-sync; battery-friendly

# ─── WINDOW ───────────────────────────────────────────────────────────────────
fullscreen=no
border=no
keep-open=no                            # Close window when playback ends
ontop=yes
geometry=50%:50%
autofit-larger=90%x80%
autofit-smaller=30%x30%
cursor-autohide=1000

# ─── AUDIO ────────────────────────────────────────────────────────────────────
ao=pipewire,pulse
audio-channels=stereo
volume=80
volume-max=100
audio-file-auto=fuzzy

# ─── SUBTITLES ────────────────────────────────────────────────────────────────
slang=en,eng,english
sub-auto=fuzzy
sub-file-paths=sub:subtitles:subs:Subs:Subtitles
alang=jp,jpn,japanese,en,eng,english
sub-font='Noto Sans'
sub-font-size=48
sub-color='#FFFFFFFF'
sub-border-color='#000000'
sub-border-size=2.5
sub-shadow-offset=1
sub-shadow-color='#33000000'
sub-margin-y=50

# ─── CACHE & STREAMING ────────────────────────────────────────────────────────
cache=yes

# [FIXED] 150M → 300M: log showed severe buffering at 0% on 4K streams
demuxer-max-bytes=300M

# [FIXED] 50M → 100M: allows better backward seek without re-fetching
demuxer-max-back-bytes=100M

# [ADDED] Pause and wait for cache to refill before resuming (seconds)
# Prevents the repeated 0% buffer oscillation seen in log
cache-pause-wait=3

# [ADDED] Don't pause at stream start until cache has some data
cache-pause-initial=yes

# [ADDED] Seconds of future content to preload
demuxer-readahead-secs=120

# [ADDED] Preload next playlist entry while current is playing
prefetch-playlist=yes

# ─── WATCH LATER ──────────────────────────────────────────────────────────────
save-position-on-quit=yes
watch-later-options=start,volume,sub-scale

# ─── PLAYLIST ─────────────────────────────────────────────────────────────────
loop-playlist=no
loop-file=no

# ─── SCREENSHOTS ──────────────────────────────────────────────────────────────
screenshot-format=png
screenshot-png-compression=7
screenshot-template='~/Pictures/MPV/%F-%P'
screenshot-directory=~/Pictures/MPV

# ─── OSD ──────────────────────────────────────────────────────────────────────
osd-level=1
osd-duration=2000
osd-font='Noto Sans'
osd-font-size=32
osd-color='#FFFFFFFF'
osd-border-color='#000000'
osd-bar-align-y=-1
osd-bar-w=80
osd-bar-h=2

# ─── SYSTEM ───────────────────────────────────────────────────────────────────
taskbar-progress=no
stop-screensaver=yes

input-default-bindings=no
input-builtin-bindings=no

# ═══════════════════════════════════════════════════════════════════════════════
#  PROFILES
# ═══════════════════════════════════════════════════════════════════════════════

[audio]
video=no
term-osd-bar=yes

[protocol.http]
cache=yes
hls-bitrate=max
user-agent='Mozilla/5.0'
network-timeout=30

[protocol.https]
profile=protocol.http

[protocol.ytdl]
profile=protocol.http

[extension.gif]
loop-file=inf

[extension.webm]
loop-file=inf

[extension.mp3]
profile=audio

[extension.flac]
profile=audio

[extension.m4a]
profile=audio

[extension.opus]
profile=audio

[extension.ogg]
profile=audio
