# ═══════════════════════════════════════════════════════════════════════════════
#  yt.conf — Configuration for yt.lua MPV script
# ═══════════════════════════════════════════════════════════════════════════════
#  Location: ~/.config/mpv/script-opts/yt.conf
#  Restart mpv or reload script after changes
# ═══════════════════════════════════════════════════════════════════════════════

# ─── BINARY PATHS ─────────────────────────────────────────────────────────────
# Paths to external binaries (auto-detected on PATH by default)

ytdlp_bin=yt-dlp
ffmpeg_bin=ffmpeg
aria2c_bin=aria2c
browser_bin=firefox

# Clipboard command (wl-paste for Wayland, xclip for X11)
clipboard_cmd=wl-paste

# ─── DOWNLOAD DIRECTORY ───────────────────────────────────────────────────────
# Target directory for downloads (~ expands to HOME)

download_directory=/home/salazar/movies/downloads/mpv

# ─── PLAYBACK QUALITY ─────────────────────────────────────────────────────────
# Default quality format string for playback (applied when mpv doesn't have one set)
# Examples:
#   bestvideo+bestaudio/best                          — best available quality
#   bestvideo[height<=1080]+bestaudio/best            — max 1080p
#   bestvideo[height<=720]+bestaudio/best             — max 720p
#   bestvideo[height<=1080][fps<=30]+bestaudio/best   — 1080p max 30fps

default_quality=bestvideo+bestaudio/best

# ─── DOWNLOAD SETTINGS ────────────────────────────────────────────────────────

# Enable aria2c for faster downloads (yes/no)
# When disabled (no), yt-dlp uses its built-in downloader with ffmpeg
# When enabled (yes), aria2c must be installed and available
# Default: no (uses yt-dlp + ffmpeg only)
enable_aria2c=no

# Prompt for quality selection before downloading (yes/no)
# yes  — Shows quality menu before every download
# no   — Uses default_video_quality and default_audio_format automatically
# Default: yes
enable_quality_prompt=yes

# Default quality when enable_quality_prompt=no
# Video: resolution in pixels (e.g., 2160, 1440, 1080, 720, 480)
# Used only when quality prompt is disabled
default_video_quality=1080

# Audio format for audio-only downloads
# Supported: mp3, m4a, opus, flac, wav, aac, vorbis
# Quality is always set to best (0)
default_audio_format=mp3

# Number of parallel downloads allowed (currently only 1 is supported)
# Future feature: parallel downloads
downloader_parallelism=1

# ─── SEARCH SETTINGS ──────────────────────────────────────────────────────────

# Number of search results to return
# Range: 1-20, default: 5
search_count=5

# ─── UI SETTINGS ──────────────────────────────────────────────────────────────

# Font for OSD menus
# Use a monospace font for best alignment
font=JetBrains Mono

# Base font size for menus
# Adjust based on your screen resolution
font_size=12

# OSD menu auto-close duration (seconds)
# Menus close automatically after this period of inactivity
# Range: 3-60, default: 8
osd_duration=8

# ─── CACHE SETTINGS ───────────────────────────────────────────────────────────

# Format cache TTL (Time To Live) in seconds
# How long to cache yt-dlp format information per video
# Reduces redundant yt-dlp calls for recently accessed videos
# Range: 60-3600, default: 300 (5 minutes)
format_cache_ttl=300

# ═══════════════════════════════════════════════════════════════════════════════
#  KEYBINDINGS (for reference - defined in yt.lua, not configurable here)
# ═══════════════════════════════════════════════════════════════════════════════
#
#  Ctrl+Shift+S   YouTube search
#  Ctrl+F         Quality picker (change playback quality)
#  Ctrl+A         Add clipboard URL to queue
#  Ctrl+N / P     Next / Previous in playlist
#  Ctrl+Q         Toggle queue display
#  Alt+D          Download video (with quality prompt if enabled)
#  Alt+A          Download audio (with quality prompt if enabled)
#  Ctrl+O         Open current URL in browser
#
#  Menu navigation:
#    ↑ ↓          Navigate items
#    Enter        Confirm selection
#    ESC          Close menu
#    x            Remove item (queue display only)
#
# ═══════════════════════════════════════════════════════════════════════════════
#  EXAMPLES
# ═══════════════════════════════════════════════════════════════════════════════
#
#  === Example 1: Laptop with limited bandwidth ===
#  default_quality=bestvideo[height<=720][fps<=30]+bestaudio/best
#  enable_aria2c=no
#  enable_quality_prompt=yes
#  default_video_quality=720
#
#  === Example 2: Desktop with fast connection ===
#  default_quality=bestvideo+bestaudio/best
#  enable_aria2c=yes
#  enable_quality_prompt=yes
#  default_video_quality=1080
#
#  === Example 3: Automated batch downloads ===
#  enable_quality_prompt=no
#  default_video_quality=1080
#  default_audio_format=opus
#  enable_aria2c=yes
#
#  === Example 4: Audio-focused setup ===
#  default_audio_format=opus
#  default_quality=bestaudio/best
#  enable_quality_prompt=yes
#
# ═══════════════════════════════════════════════════════════════════════════════
