
h script-binding gallery-view-toggle-split
g script-binding gallery-view-toggle
CTRL+SHIFT+s    script-binding yt-search        #! YouTube Search
ctrl+f          script-binding yt-quality       #! Quality Picker
ctrl+u          script-binding yt-upnext        #! Up Next / Recommended
ctrl+a          script-binding yt-clip-add      #! Add Clipboard URL to Queue
ctrl+n          script-binding yt-next          #! Queue Next
ctrl+p          script-binding yt-prev          #! Queue Previous
ctrl+q          script-binding yt-queue         #! Toggle Queue
alt+d           script-binding yt-dl-video      #! Download Video
alt+a           script-binding yt-dl-audio      #! Download Audio
ctrl+o          script-binding yt-browser       #! Open in Browser


#----------------------------------[ Shortcuts ]------------------------------------
ctrl+h          script-binding uosc_history/history            #! Playback History
Ctrl+shift+h    script-binding uosc_history/clear_history      #! Clear History
ctrl+b          script-binding uosc_history/bookmarks          #! Bookmarks
Ctrl+shift+b    script-binding uosc_history/add_bookmarks      #! Add Bookmarks
shift+del    script-binding uosc/delete-file-next      #! Delete file
#Ctrl+shift+h    script-binding uosc_history/clear_history      #! C
# ── Separate quality-menu.lua script ───────────────────────────────────────────
F               script-binding quality_menu/video_formats_toggle
Alt+f           script-binding quality_menu/audio_formats_toggle

z               run xdg-open "${path}" ; quit-watch-later

# ── Playback ───────────────────────────────────────────────────────────────────
SPACE           cycle pause
KP0             cycle pause
KP_INS          cycle pause
MBTN_LEFT       cycle pause
f               cycle fullscreen
MBTN_LEFT_DBL   cycle fullscreen
m               cycle mute
ESC             set fullscreen no
# ctrl+a moved to Script 2 add_to_queue — use Alt+t for ontop instead
Alt+t           cycle ontop
q               quit

# ── Seeking ────────────────────────────────────────────────────────────────────
RIGHT           seek  5
LEFT            seek -5
UP              add volume 2
DOWN            add volume -2
Shift+RIGHT     seek  2 exact
Shift+LEFT      seek -2 exact
Ctrl+RIGHT      seek  50
Ctrl+LEFT       seek -50

# ── Playlist ───────────────────────────────────────────────────────────────────
n               playlist-next
p               playlist-prev
N               playlist-next force
P               playlist-prev force

# ── Chapters ───────────────────────────────────────────────────────────────────
.               add chapter  1
,               add chapter -1

# ── Audio ──────────────────────────────────────────────────────────────────────
b               cycle audio
B               cycle audio down

# ── Subtitles ──────────────────────────────────────────────────────────────────
v               cycle sub
V               cycle sub down
<               add sub-delay -0.1
>               add sub-delay  0.1
SHIFT+UP        add sub-pos -1
SHIFT+DOWN      add sub-pos 1
t               add sub-font-size -2
T               add sub-font-size 2

# ── Loop ───────────────────────────────────────────────────────────────────────
l               cycle-values loop-file "inf" "no"
L               cycle-values loop-playlist "inf" "no"

# ── Speed ──────────────────────────────────────────────────────────────────────
[               add speed -0.1
]               add speed 0.1
{               frame-back-step
}               frame-step
BS              set speed 1.0

# ── Brightness ─────────────────────────────────────────────────────────────────
0               add brightness -1
9               add brightness 1

# ── Screenshot ─────────────────────────────────────────────────────────────────
# ctrl+s moved to Script 2 save_queue — screenshot remapped to Alt+w
Alt+w           screenshot
Alt+s           screenshot each-frame

# ── UOSC ───────────────────────────────────────────────────────────────────────
MBTN_RIGHT      script-binding uosc/menu
TAB             script-binding uosc/menu
Enter           script-binding uosc/playlist
k               script-binding uosc/keybinds
a               script-binding uosc/audio
c               script-binding uosc/chapters
s               script-binding uosc/subtitles
e               script-binding uosc/open-file
S               script-binding uosc/stream-quality

# ── Rotate / Scale / Aspect ────────────────────────────────────────────────────
r               cycle-values video-rotate 90 180 270 0
w               cycle-values window-scale 1 0.5 0.3 0.2 0.15
o               cycle-values video-aspect-override "16:9" "4:3" "2.35:1" "no"

# ── Zoom & Pan ─────────────────────────────────────────────────────────────────
Alt+BS          set video-zoom 0 ; set video-pan-x 0 ; set video-pan-y 0
Alt+=           add video-zoom  0.1
Alt+-           add video-zoom -0.1
Alt+LEFT        add video-pan-x -0.05
Alt+RIGHT       add video-pan-x  0.05
Alt+UP          add video-pan-y -0.05
Alt+DOWN        add video-pan-y  0.05

# ── Mouse ──────────────────────────────────────────────────────────────────────
MBTN_BACK       playlist-prev
MBTN_FORWARD    playlist-next
WHEEL_UP        add volume  2
WHEEL_DOWN      add volume -2
Shift+WHEEL_UP  seek  5
Shift+WHEEL_DOWN seek -5
Ctrl+WHEEL_UP   add sub-scale  0.1
Ctrl+WHEEL_DOWN add sub-scale -0.1
